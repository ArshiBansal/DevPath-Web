name: "Nuclei Security Scan"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    name: Nuclei API & Web Security Scan
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock_api_key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock_project_id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Serve static build
        run: npx serve@latest out -l 3000 &

      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 > /dev/null && echo "Server is up!" && break
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Install Nuclei
        run: |
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.8/nuclei_3.3.8_linux_amd64.zip
          unzip -q nuclei_3.3.8_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/
          nuclei -version

      - name: Run Nuclei Scan
        run: |
          nuclei -u http://localhost:3000 \
            -tags exposure,misconfig,headers,tech \
            -severity low,medium,high,critical \
            -o nuclei-results.txt \
            -no-color || true

      - name: Upload Nuclei Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-security-report
          path: nuclei-results.txt
          retention-days: 30
